name: CI

on:
  push:
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: clang-format
        run: clang-format --dry-run --Werror extension/*.c extension/*.h test/c/*.c fuzz/*.c

  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: clang
          - os: ubuntu-latest
            cc: gcc
          - os: macos-latest
            cc: clang
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build sqlite3 libsqlite3-dev
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja sqlite
      - name: Configure
        run: cmake -S . -B build -G Ninja -DMSGDB_BUILD_FUZZERS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows-build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: vcpkg install sqlite3:x64-windows
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build sqlite3 libsqlite3-dev
      - name: Configure
        run: cmake -S . -B build-asan -G Ninja -DMSGDB_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build-asan
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-asan --output-on-failure

  static-analysis:
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-tidy cppcheck ninja-build sqlite3 libsqlite3-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja
      - name: clang-tidy
        run: clang-tidy -p build extension/*.c test/c/*.c fuzz/*.c
      - name: cppcheck
        run: cppcheck --project=build/compile_commands.json --enable=warning,style,performance,portability --error-exitcode=1
