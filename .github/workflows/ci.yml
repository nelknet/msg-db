name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '17 8 * * *'

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: clang-format
        run: clang-format --dry-run --Werror extension/*.c extension/*.h test/c/*.c fuzz/*.c fuzz/*.h

  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: clang
          - os: ubuntu-latest
            cc: gcc
          - os: macos-latest
            cc: clang
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build sqlite3 libsqlite3-dev
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ninja sqlite
          echo "CMAKE_PREFIX_PATH=$(brew --prefix sqlite)" >> "$GITHUB_ENV"
      - name: Configure
        run: cmake -S . -B build -G Ninja -DMSGDB_BUILD_FUZZERS=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows-build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: vcpkg install sqlite3:x64-windows
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build sqlite3 libsqlite3-dev
      - name: Configure
        run: cmake -S . -B build-asan -G Ninja -DMSGDB_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build-asan
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-asan --output-on-failure

  fuzz-smoke:
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build sqlite3 libsqlite3-dev
      - name: Configure
        run: cmake -S . -B build-fuzz -G Ninja -DMSGDB_BUILD_FUZZERS=ON -DMSGDB_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build-fuzz --target fuzz_strings fuzz_sql_model fuzz_vtab_args
      - name: Run fuzz smoke
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1
        run: |
          ./build-fuzz/fuzz_strings -runs=1024 -max_len=4096
          ./build-fuzz/fuzz_sql_model -runs=512 -max_len=1024
          ./build-fuzz/fuzz_vtab_args -runs=512 -max_len=1024

  scheduled-fuzz:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build sqlite3 libsqlite3-dev
      - name: Configure
        run: cmake -S . -B build-fuzz -G Ninja -DMSGDB_BUILD_FUZZERS=ON -DMSGDB_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build-fuzz --target fuzz_strings fuzz_sql_model fuzz_vtab_args
      - name: Run scheduled fuzzing
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1
        run: |
          ./build-fuzz/fuzz_strings -max_total_time=120 -max_len=4096
          ./build-fuzz/fuzz_sql_model -max_total_time=180 -max_len=1024
          ./build-fuzz/fuzz_vtab_args -max_total_time=180 -max_len=1024

  static-analysis:
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-tidy cppcheck ninja-build sqlite3 libsqlite3-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DMSGDB_BUILD_FUZZERS=ON
      - name: clang-tidy
        run: clang-tidy -p build extension/*.c test/c/*.c fuzz/*.c
      - name: cppcheck
        run: cppcheck --project=build/compile_commands.json --enable=warning,style,performance,portability --suppress=constParameterCallback --error-exitcode=1
