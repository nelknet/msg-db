name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: '17 9 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build sqlite3 libsqlite3-dev
      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: manual
      - name: Build
        run: |
          cmake -S . -B build -G Ninja
          cmake --build build
      - uses: github/codeql-action/analyze@v3
