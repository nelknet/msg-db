name: Nightly

on:
  schedule:
    - cron: '41 8 * * *'
  workflow_dispatch:

jobs:
  valgrind:
    runs-on: ubuntu-latest
    env:
      CC: gcc
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build sqlite3 libsqlite3-dev valgrind
      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build
      - name: Valgrind core tests
        run: valgrind --leak-check=full --error-exitcode=1 build/msgdb_core_tests
      - name: SQL integration tests
        run: ctest --test-dir build --output-on-failure -R sql_integration

  fuzz-smoke:
    runs-on: ubuntu-latest
    env:
      CC: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build sqlite3 libsqlite3-dev
      - name: Build fuzzers
        run: |
          cmake -S . -B build-fuzz -G Ninja -DMSGDB_BUILD_FUZZERS=ON
          cmake --build build-fuzz
      - name: Run string fuzzer smoke
        run: build-fuzz/fuzz_strings -max_total_time=30
